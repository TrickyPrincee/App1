<!DOCTYPE html>
{% load static %}
<html>
<head>
    <title>{{ question.question_text }} - Results</title>
    <link rel="stylesheet" href="{% static 'polls/style.css' %}">
</head>
<body>
    <div class="header">
        <h1><a href="{% url 'polls:index' %}">← Back to Polls</a></h1>
    </div>

    <div class="container">
        <h2 class="question-title">{{ question.question_text }}</h2>

        <ul class="results-list">
        {% for choice in question.choice_set.all %}
            <li class="result-item">
                <span class="choice-text">{{ choice.choice_text }}</span>
                <span class="vote-count">{{ choice.votes }} vote{{ choice.votes|pluralize }}</span>
                <div class="vote-bar" style="width: {{ choice.votes }}0%"></div>
            </li>
        {% endfor %}
        </ul>

        <a href="{% url 'polls:detail' question.id %}" class="vote-again-btn">Vote again?</a>
    </div>
</body>
</html>
